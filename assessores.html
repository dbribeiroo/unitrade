<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontre seu Assessor - UniTrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="app-assessores">
        <header class="container py-3 d-flex justify-content-between align-items-center border-bottom mb-4">
            <div class="d-flex align-items-center gap-3">
                <a href="index.html" class="text-secondary text-decoration-none fs-5">&larr;</a>
                <div class="logo-icon-small text-white fw-bold d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">UT</div>
            </div>
            <div class="d-flex gap-3 text-secondary">
                <span style="cursor: pointer;">🔔</span>
                <span style="cursor: pointer;">👤</span>
            </div>
        </header>

        <main class="container pb-5">
            <div class="mb-5">
                <h1 class="h2 fw-bold text-dark mb-1">Encontre seu Assessor Ideal</h1>
                <p class="text-secondary mb-4">Conecte-se com assessores certificados e receba recomendações personalizadas</p>
                
                <input 
                    type="text" 
                    v-model="termoBusca" 
                    class="search-input shadow-sm" 
                    placeholder="Busque por nome ou especialidade..."
                >
            </div>

            <div class="row g-4 text-center">
                
                <div v-if="assessoresFiltrados.length === 0" class="col-12 py-5 text-secondary">
                    Nenhum assessor encontrado para a sua busca.
                </div>

                <div v-for="assessor in assessoresFiltrados" :key="assessor.sigla" class="col-12 col-md-6 col-lg-4">
                    <div class="assessor-card">
                        
                        <div class="avatar-assessor shadow-sm">{{ assessor.sigla }}</div>
                        <h3 class="h5 fw-bold text-dark mb-1">{{ assessor.nome }}</h3>
                        <p class="text-secondary small mb-2">{{ assessor.especialidade }}</p>
                        
                        <div class="d-flex justify-content-center align-items-center gap-1 mb-3">
                            <span class="text-primary">★</span>
                            <span class="fw-bold text-dark">{{ assessor.nota }}</span>
                            <span class="text-secondary small">({{ assessor.avaliacoes }})</span>
                        </div>

                        <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">
                            <span v-for="cert in assessor.certificacoes" :key="cert" class="badge-certificacao">
                                🎗️ {{ cert }}
                            </span>
                        </div>

                        <div class="mt-auto d-flex gap-2">
                            <button @click="verPerfil(assessor.nome)" class="btn btn-light w-50 border fw-semibold text-secondary">Ver Perfil</button>
                            <button @click="contratar(assessor.nome)" class="btn btn-primary w-50 fw-semibold">Contratar</button>
                        </div>
                        
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="assessores.js"></script>
</body>
</html>
